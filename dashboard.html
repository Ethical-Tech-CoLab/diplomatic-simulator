<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Session Dashboard — Diplomatic Simulator</title>
<style>
:root{--crimson:#6d28d9;--navy:#241539;--ink:#1a1020;--muted:#6b6478;--paper:#f5f2f9;--line:#e4dcf3;--gold:#7b5cff;--card:#ffffff}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:"Helvetica Neue",Arial,sans-serif;line-height:1.55;font-size:14px}
h1,h2,h3{font-family:Georgia,"Times New Roman",serif;color:var(--navy);margin:0 0 .4em}
h1{font-size:1.5rem;color:#fff;line-height:1.2}
h2{font-size:1.2rem;border-bottom:2px solid var(--crimson);padding-bottom:.2em;margin:0 0 .7em}
h3{font-size:1rem;color:var(--crimson);margin:1em 0 .3em}
a{color:var(--crimson);text-decoration:none}a:hover{text-decoration:underline}
.wrap{max-width:1120px;margin:0 auto;padding:0 20px}
header.hero{background:linear-gradient(135deg,var(--navy),#120c1a);color:#fff;padding:18px 0 14px;border-bottom:5px solid var(--crimson)}
.hero .top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.eyebrow{letter-spacing:.16em;text-transform:uppercase;font-size:.66rem;color:var(--gold)}
.backlink{color:#cfd6e6;font-size:.8rem}.backlink:hover{color:#fff}
select{background:#120c1a;color:#fff;border:1px solid #3a4a6a;border-radius:6px;padding:7px 10px;font-size:.85rem;max-width:100%}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:12px}
.kpi{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:8px 10px;text-align:center}
.kpi .n{font-family:Georgia,serif;font-size:1.4rem;color:#fff;font-weight:600}
.kpi .l{font-size:.62rem;color:#cfd6e6;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.tabs{position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--line);display:flex;gap:2px;padding:6px 0;flex-wrap:wrap}
.tab{border:1px solid var(--line);background:#fff;border-radius:99px;padding:6px 14px;font-size:.82rem;cursor:pointer;color:var(--navy)}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.view{padding:16px 0 40px}
.hidden{display:none!important}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.muted{color:var(--muted)}.small{font-size:.82rem}
.tag{display:inline-block;background:var(--paper);border:1px solid var(--line);color:var(--muted);font-size:.68rem;padding:2px 8px;border-radius:99px;margin:2px 4px 2px 0}
.chip{display:inline-block;font-size:.66rem;padding:1px 7px;border-radius:99px;margin:2px 3px 0 0;border:1px solid}
/* scoreboard bars */
.bar{display:flex;align-items:center;gap:8px;margin:5px 0}
.bar .nm{width:150px;font-size:.82rem;flex:none;text-align:right}
.bar .track{flex:1;background:#efe9df;border-radius:99px;height:16px;overflow:hidden}
.bar .fill{height:100%;border-radius:99px}
.bar .v{width:38px;font-size:.78rem;color:var(--muted)}
/* party cards */
.pcard{background:var(--card);border:1px solid var(--line);border-left-width:5px;border-radius:10px;padding:14px 16px}
.pcard h3{margin:.1em 0 .2em;color:var(--navy)}
.pcard .role{font-size:.82rem;color:var(--muted);margin-bottom:8px}
.pcard .lbl{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);margin:10px 0 3px;font-weight:600}
.pcard ul{margin:.2em 0 .3em;padding-left:16px}.pcard li{margin:.15em 0;font-size:.83rem}
.secret{background:#fbf3f4;border:1px dashed var(--crimson);border-radius:8px;padding:8px 10px;margin-top:6px}
.secret .lbl{color:var(--crimson)}
.sat{float:right;font-family:Georgia,serif;font-size:1.05rem}
/* transcript */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.pfilter{cursor:pointer;font-size:.72rem;padding:3px 9px;border-radius:99px;border:1px solid;opacity:.45}
.pfilter.on{opacity:1;font-weight:600}
.round-h{font-family:Georgia,serif;color:var(--navy);border-bottom:1px solid var(--line);padding-bottom:3px;margin:18px 0 8px;font-size:1rem}
.move{background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:9px;padding:11px 14px;margin:9px 0;max-width:82%}
.move.right{margin-left:18%}
.mhead{display:flex;justify-content:space-between;gap:10px;margin-bottom:4px;align-items:baseline}
.mhead .who{font-weight:600}
.mhead .kind{font-size:.64rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.mtext{font-size:.9rem}
/* heatmap */
table.heat{border-collapse:collapse;width:100%;font-size:.76rem}
table.heat th,table.heat td{border:1px solid var(--line);padding:5px 7px;text-align:center}
table.heat th{background:var(--navy);color:#fff;font-family:Georgia,serif;font-weight:500}
table.heat td.name{text-align:left;white-space:nowrap;font-weight:600;background:#fcfaf6}
.detrow{display:flex;gap:10px;align-items:baseline;padding:6px 0;border-bottom:1px dashed var(--line);font-size:.82rem}
.conf{font-size:.7rem;color:var(--muted)}
footer{border-top:1px solid var(--line);color:var(--muted);font-size:.8rem;text-align:center;padding:16px 0;margin-top:10px}
@media(max-width:820px){.kpis{grid-template-columns:repeat(3,1fr)}.grid2,.grid3{grid-template-columns:1fr}.move,.move.right{max-width:100%;margin-left:0}.bar .nm{width:96px}}
</style></head><body>
<header class="hero"><div class="wrap">
  <div class="top">
    <div>
      <a class="backlink" href="index.html">← Diplomatic Simulator</a>
      <div class="eyebrow">Session Dashboard</div>
      <h1 id="title">…</h1>
    </div>
    <div><select id="sessionSelect"></select></div>
  </div>
  <div class="kpis" id="kpis"></div>
</div></header>

<div class="wrap">
  <div class="tabs" id="tabs"></div>
  <div id="v-overview" class="view"></div>
  <div id="v-parties" class="view hidden"></div>
  <div id="v-transcript" class="view hidden"></div>
  <div id="v-proposals" class="view hidden"></div>
  <div id="v-detectors" class="view hidden"></div>
</div>
<footer><div class="wrap">Notional exercise material · generated by AI agents (Claude Opus 4.8) · <a href="live.html">live replay</a> · <a href="montecarlo.html">Monte Carlo analysis</a> · <a href="methodology.html">methodology &amp; AI use</a> · Ethical Tech CoLab</div></footer>

<script src="./diplomacy-demo/data.js"></script>
<script>
(function(){
  var data = window.DIPLOMACY_SNAPSHOT_DEMO || {sessions:[]};
  var sessions = (data.sessions||[]);
  // prefer the scenario sessions in the picker
  var PREF = ['sess-arctic-iscne-01','sess-centralasia-iscne-01','sess-cyprus-iscne-01','sess-scs-iscne-01'];
  sessions = sessions.slice().sort(function(a,b){
    var ia=PREF.indexOf(a.id), ib=PREF.indexOf(b.id);
    if(ia<0)ia=99; if(ib<0)ib=99; return ia-ib;
  });
  var PALETTE=['#1B2A4E','#A41034','#2e7d32','#b08a3e','#6a1b9a','#00838f','#c62828','#455a64','#ad1457','#4527a0','#00695c'];
  var E=document.getElementById.bind(document);
  function esc(x){return String(x==null?'':x).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function el(id){return E(id);}
  function num(x){return x==null?'–':(Math.round(x*100)/100);}

  var select=el('sessionSelect');
  sessions.forEach(function(s){var o=document.createElement('option');o.value=s.id;o.textContent=s.title;select.appendChild(o);});
  var params=new URLSearchParams(location.search), wanted=params.get('session');
  if(wanted && sessions.some(function(s){return s.id===wanted;})) select.value=wanted;
  else if(sessions[0]) select.value=sessions[0].id;

  var TABS=[['overview','Overview'],['parties','Parties & Thoughts'],['transcript','Transcript'],['proposals','Proposals'],['detectors','Detector Hits']];
  var tabbar=el('tabs');
  TABS.forEach(function(t,i){var b=document.createElement('div');b.className='tab'+(i===0?' active':'');b.textContent=t[1];b.dataset.k=t[0];b.onclick=function(){showTab(t[0]);};tabbar.appendChild(b);});
  function showTab(k){
    TABS.forEach(function(t){el('v-'+t[0]).classList.toggle('hidden',t[0]!==k);});
    [].forEach.call(tabbar.children,function(b){b.classList.toggle('active',b.dataset.k===k);});
  }

  var S, colorOf, filterParty=null;

  function render(id){
    S=sessions.find(function(s){return s.id===id;})||sessions[0];
    if(!S)return;
    colorOf={}; (S.parties||[]).forEach(function(p,i){colorOf[p.teamTwinName]=PALETTE[i%PALETTE.length];});
    el('title').textContent=S.title;
    renderKpis(); renderOverview(); renderParties(); renderTranscript(); renderProposals(); renderDetectors();
  }

  function nameOf(tw){var p=(S.parties||[]).find(function(x){return x.teamTwinName===tw;});return p?p.displayName:tw;}
  function sideOf(tw){var p=(S.parties||[]).find(function(x){return x.teamTwinName===tw;});return p&&p.side?p.side:'left';}
  function scoreOf(tw){return (S.scoreboard||[]).find(function(x){return x.teamTwinName===tw;})||{};}

  function renderKpis(){
    var rounds=Math.max.apply(null,[0].concat((S.moves||[]).map(function(m){return m.roundNumber||0;})));
    var sats=(S.scoreboard||[]).map(function(x){return x.satisfaction;}).filter(function(v){return typeof v==='number';});
    var avg=sats.length?sats.reduce(function(a,b){return a+b;},0)/sats.length:null;
    var agree=(S.scoreboard||[]).reduce(function(a,x){return a+(x.agreementsWon||0);},0);
    var K=[['Parties',(S.parties||[]).length],['Rounds',rounds],['Statements',(S.moves||[]).length],
      ['Detector hits',(S.tactics||[]).length],['Avg satisfaction',avg==null?'–':avg.toFixed(2)],['Agreements',agree]];
    el('kpis').innerHTML=K.map(function(k){return '<div class="kpi"><div class="n">'+esc(k[1])+'</div><div class="l">'+esc(k[0])+'</div></div>';}).join('');
  }

  function renderOverview(){
    var cv=S.convenerReport||{};
    function ul(a){return (a&&a.length)?'<ul>'+a.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul>':'<p class="muted small">None recorded.</p>';}
    var conv='<div class="card"><h2>Convener Report</h2>'+
      (cv.headline?'<p><strong>'+esc(cv.headline)+'</strong></p>':'')+
      (cv.summary?'<p class="small">'+esc(cv.summary)+'</p>':'')+
      '<div class="grid2"><div><h3>Key outcomes</h3>'+ul(cv.keyOutcomes)+'</div><div><h3>Unresolved</h3>'+ul(cv.unresolved)+'</div></div></div>';
    // scoreboard bars
    var sb=(S.scoreboard||[]).slice().sort(function(a,b){return (b.satisfaction||0)-(a.satisfaction||0);});
    var bars=sb.map(function(x){
      var pct=Math.round((x.satisfaction||0)*100);
      return '<div class="bar"><div class="nm">'+esc(nameOf(x.teamTwinName))+'</div>'+
        '<div class="track"><div class="fill" style="width:'+pct+'%;background:'+ (colorOf[x.teamTwinName]||'#888') +'"></div></div>'+
        '<div class="v">'+(x.satisfaction!=null?x.satisfaction.toFixed(2):'–')+'</div></div>';
    }).join('');
    var score='<div class="card"><h2>Scoreboard — satisfaction</h2>'+bars+
      '<p class="muted small" style="margin-top:8px">Satisfaction is the analyst agent’s 0–1 rating of how well each delegation’s objectives were served in the transcript — a subjective AI judgement, not a measured outcome.</p></div>';
    el('v-overview').innerHTML='<div class="grid2" style="align-items:start">'+conv+score+'</div>'+
      '<div class="card" style="margin-top:16px"><h3>About this session</h3><p class="small">'+esc(S.description||'')+'</p>'+
      '<p class="small"><a href="live.html?session='+esc(S.id)+'"><strong>▶ Watch this negotiation live</strong></a> · <a href="diplomacy-demo/index.html?session='+esc(S.id)+'">simple replay table</a> · <a href="methodology.html">how this was made</a></p></div>';
  }

  function renderParties(){
    var parts=(S.parties||[]).map(function(p){
      var b=p.brief||{}; var sc=scoreOf(p.teamTwinName); var col=colorOf[p.teamTwinName];
      var db=(S.debriefs||[]).find(function(d){return d.teamTwinName===p.teamTwinName;})||{};
      function list(a){return (a&&a.length)?'<ul>'+a.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul>':'<p class="muted small">—</p>';}
      var goals=(db.goals||[]).map(function(g){
        var cmap={achieved:'#2e7d32',partial:'#b08a3e',failed:'#c62828',untouched:'#888'};
        return '<div class="small" style="margin:3px 0"><span class="chip" style="border-color:'+(cmap[g.status]||'#888')+';color:'+(cmap[g.status]||'#888')+'">'+esc(g.status||'?')+'</span> '+esc(g.description||'')+'</div>';
      }).join('');
      var es=b.endStates||{};
      return '<div class="pcard" style="border-left-color:'+col+'">'+
        '<span class="sat" style="color:'+col+'">'+(sc.satisfaction!=null?sc.satisfaction.toFixed(2):'–')+'</span>'+
        '<h3>'+esc(p.displayName)+'</h3>'+
        '<div class="role">'+esc(b.role||'')+'</div>'+
        (es.primary?'<div class="lbl">Primary end-state</div><div class="small">'+esc(es.primary)+'</div>':'')+
        '<div class="lbl">Red lines</div>'+list(b.redLines)+
        (b.batna?'<div class="lbl">BATNA (walk-away)</div><div class="small">'+esc(b.batna)+'</div>':'')+
        (b.coalitions&&b.coalitions.natural_allies?'<div class="lbl">Leans toward</div><div>'+(b.coalitions.natural_allies||[]).map(function(x){return '<span class="tag">'+esc(x)+'</span>';}).join('')+'</div>':'')+
        (b.privateStrategy&&b.privateStrategy.length?'<div class="secret"><div class="lbl">Private strategy — their "thoughts" (confidential instructions)</div>'+list(b.privateStrategy)+'</div>':'')+
        (goals?'<div class="lbl">Debrief — goal outcomes</div>'+goals:'')+
        '</div>';
    }).join('');
    el('v-parties').innerHTML='<p class="muted small" style="margin-bottom:10px">Each delegation’s brief is distilled from its confidential <em>privileged instructions</em>. The dashed red box is its private strategy — what the agent knew but did not say aloud.</p><div class="grid2">'+parts+'</div>';
  }

  function roundLabel(m){
    var k=(m.kind||'');
    if(k.indexOf('opening')>=0)return 'Opening';
    if(k.indexOf('closing')>=0)return 'Closing';
    if(k==='positioning')return 'Positioning';
    if(k==='offer')return 'Bargaining / offer';
    return k||'statement';
  }

  function renderTranscript(){
    var host=el('v-transcript');
    var pf='<div class="filters"><span class="small muted">Filter by delegation:</span>'+
      '<span class="pfilter on" data-p="ALL" style="border-color:#888;color:#444">All</span>'+
      (S.parties||[]).map(function(p){var c=colorOf[p.teamTwinName];return '<span class="pfilter on" data-p="'+esc(p.teamTwinName)+'" style="border-color:'+c+';color:'+c+'">'+esc(p.displayName)+'</span>';}).join('')+'</div>';
    var body='<div id="tbody"></div>';
    host.innerHTML=pf+body;
    var active={}; (S.parties||[]).forEach(function(p){active[p.teamTwinName]=true;});
    function draw(){
      var cur=null,html='';
      (S.moves||[]).forEach(function(m){
        if(!active[m.partyTwin])return;
        if(m.roundNumber!==cur){cur=m.roundNumber;html+='<div class="round-h">Round '+cur+'</div>';}
        var c=colorOf[m.partyTwin]||'#888';
        var chips=(m.tacticsApplied||[]).map(function(t){return '<span class="chip" style="border-color:'+c+';color:'+c+'">'+esc(t)+'</span>';}).join('');
        html+='<div class="move '+sideOf(m.partyTwin)+'" style="border-left-color:'+c+'">'+
          '<div class="mhead"><span class="who" style="color:'+c+'">'+esc(nameOf(m.partyTwin))+'</span><span class="kind">'+esc(roundLabel(m))+'</span></div>'+
          '<div class="mtext">'+esc(m.text||'')+'</div>'+(chips?'<div style="margin-top:5px">'+chips+'</div>':'')+'</div>';
      });
      el('tbody').innerHTML=html||'<p class="muted">No statements for this filter.</p>';
    }
    [].forEach.call(host.querySelectorAll('.pfilter'),function(f){
      f.onclick=function(){
        var p=f.dataset.p;
        if(p==='ALL'){var allOn=Object.keys(active).every(function(k){return active[k];});
          Object.keys(active).forEach(function(k){active[k]=!allOn;});}
        else active[p]=!active[p];
        [].forEach.call(host.querySelectorAll('.pfilter'),function(x){
          if(x.dataset.p==='ALL')x.classList.toggle('on',Object.keys(active).some(function(k){return active[k];}));
          else x.classList.toggle('on',active[x.dataset.p]);});
        draw();
      };
    });
    draw();
  }

  function renderProposals(){
    var offers=(S.moves||[]).filter(function(m){return (m.kind||'').indexOf('offer')>=0;});
    var host=el('v-proposals');
    if(!offers.length){host.innerHTML='<p class="muted">No discrete offer-kind proposals were tabled in this session (offers may appear within the transcript statements).</p>';return;}
    host.innerHTML='<p class="muted small" style="margin-bottom:10px">Concrete conditional offers and packages tabled during the bargaining round.</p>'+
      offers.map(function(m){var c=colorOf[m.partyTwin]||'#888';
        var chips=(m.tacticsApplied||[]).map(function(t){return '<span class="chip" style="border-color:'+c+';color:'+c+'">'+esc(t)+'</span>';}).join('');
        return '<div class="card" style="border-left:5px solid '+c+';margin:9px 0"><div class="mhead"><span class="who" style="color:'+c+'">'+esc(nameOf(m.partyTwin))+'</span><span class="kind">Round '+m.roundNumber+' · tabled proposal</span></div><div class="mtext">'+esc(m.text||'')+'</div>'+(chips?'<div style="margin-top:5px">'+chips+'</div>':'')+'</div>';
      }).join('');
  }

  function renderDetectors(){
    var host=el('v-detectors');
    var tactics=Object.keys(S.tacticCounts||{}).sort(function(a,b){return (S.tacticCounts[b])-(S.tacticCounts[a]);});
    // party x tactic matrix
    var mat={}; (S.parties||[]).forEach(function(p){mat[p.teamTwinName]={};});
    (S.tactics||[]).forEach(function(d){if(mat[d.partyTwin])mat[d.partyTwin][d.tacticId]=(mat[d.partyTwin][d.tacticId]||0)+1;});
    var maxc=1; Object.keys(mat).forEach(function(tw){tactics.forEach(function(t){maxc=Math.max(maxc,mat[tw][t]||0);});});
    var head='<tr><th class="name">Delegation \\ tactic</th>'+tactics.map(function(t){return '<th>'+esc(t)+'</th>';}).join('')+'</tr>';
    var rows=(S.parties||[]).map(function(p){
      return '<tr><td class="name">'+esc(p.displayName)+'</td>'+tactics.map(function(t){
        var v=mat[p.teamTwinName][t]||0; var a=v?(0.15+0.85*v/maxc):0;
        return '<td style="background:color-mix(in srgb, var(--crimson) '+Math.round(a*100)+'%, transparent);color:'+(a>0.5?'#fff':'#333')+'">'+(v||'')+'</td>';
      }).join('')+'</tr>';
    }).join('');
    var heat='<div class="card"><h2>Tactic heatmap</h2><div style="overflow-x:auto"><table class="heat">'+head+rows+'</table></div>'+
      '<p class="muted small" style="margin-top:8px">Counts of each negotiating tactic detected per delegation across the session (self-tagged by each agent, normalised at assembly).</p></div>';
    // detection feed
    var feed=(S.tactics||[]).map(function(d){var c=colorOf[d.partyTwin]||'#888';
      return '<div class="detrow"><span class="chip" style="border-color:'+c+';color:'+c+'">'+esc(nameOf(d.partyTwin))+'</span>'+
        '<span><strong>'+esc(d.tacticId)+'</strong> <span class="muted">· R'+d.roundNumber+'</span></span>'+
        '<span class="conf" style="margin-left:auto">'+esc(d.detector||'')+' · conf '+num(d.confidence)+'</span></div>';
    }).join('');
    host.innerHTML=heat+'<div class="card" style="margin-top:16px"><h2>Detection feed ('+((S.tactics||[]).length)+')</h2>'+(feed||'<p class="muted">No detections.</p>')+'</div>';
  }

  select.addEventListener('change',function(e){render(e.target.value); history.replaceState(null,'','?session='+encodeURIComponent(e.target.value));});
  render(select.value);
})();
</script>
</body></html>
